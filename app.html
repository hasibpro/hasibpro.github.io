<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HasibPro — حاسبة أرباح التجارة الإلكترونية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0a0f1e;--bg2:#111827;--bg3:#1a2235;--card:#141d2e;--card2:#1e2a40;--border:#1f2d45;--teal:#00d4aa;--teal2:#00b894;--teal3:rgba(0,212,170,0.1);--blue:#3b82f6;--red:#ef4444;--yellow:#f59e0b;--green:#10b981;--radius:12px;}
body.light{--bg:#f1f5f9;--bg2:#ffffff;--bg3:#e2e8f0;--card:#ffffff;--card2:#f8fafc;--border:#cbd5e1;--text:#1e293b;--text2:#475569;--text3:#94a3b8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background 0.3s,color 0.3s;}
#appContent{display:none;}
.header{background:linear-gradient(135deg,#0d1b2e,#0a1628);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
body.light .header{background:linear-gradient(135deg,#1e3a5f,#1e40af);}
.header-logo{display:flex;align-items:center;gap:9px;}
.header-icon{width:44px;height:44px;border-radius:9px;background:linear-gradient(135deg,var(--teal),var(--blue));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.header-title{font-size:13px;font-weight:800;color:#e2e8f0;line-height:1.2;}
.header-sub{font-size:10px;color:#64748b;}
.theme-btn{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:15px;color:var(--text);}
.cur-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:6px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:55px;z-index:99;}
.cur-bar label{font-size:10px;color:var(--text3);font-weight:700;white-space:nowrap;}
.cur-sel{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-family:'Cairo',sans-serif;font-size:11px;color:var(--text);flex:1;max-width:180px;}
.cur-badge{background:var(--teal3);border:1px solid rgba(0,212,170,0.2);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--teal);font-weight:700;white-space:nowrap;}
.nav-tabs{display:grid;grid-template-columns:repeat(8,1fr);background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:83px;z-index:98;}
.nav-tab{padding:6px 1px;font-family:'Cairo',sans-serif;font-size:7.5px;font-weight:700;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;}
.nav-tab .ti{font-size:16px;display:flex;align-items:center;justify-content:center;width:20px;height:20px;}
.nav-tab.active{color:var(--teal);border-bottom-color:var(--teal);background:linear-gradient(180deg,transparent,rgba(0,212,170,0.06));}
.section{display:none;padding:13px 13px 80px 13px;max-width:900px;margin:0 auto;animation:fadeIn 0.3s ease;}
.section.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.section{animation-duration:0.3s;}
.section-title{font-size:17px;font-weight:900;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.tag{background:var(--teal3);color:var(--teal);border-radius:6px;padding:2px 7px;font-size:10px;font-weight:700;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:15px;margin-bottom:12px;transition:border-color 0.2s;}
.card-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
@media(min-width:500px){.kpi-grid{grid-template-columns:repeat(4,1fr);}}
.kpi{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal),var(--blue));}
.kpi-label{font-size:9px;color:var(--text3);font-weight:600;margin-bottom:5px;}
.kpi-value{font-size:20px;font-weight:900;color:var(--teal);letter-spacing:-0.5px;}
.kpi-sub{font-size:9px;color:var(--text3);margin-top:2px;}
.form-grid{display:grid;grid-template-columns:1fr;gap:8px;}
@media(min-width:480px){.form-grid{grid-template-columns:1fr 1fr;}}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-label{font-size:10px;font-weight:700;color:var(--text2);}
.form-input,.form-select{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'Cairo',sans-serif;font-size:12px;color:var(--text);width:100%;direction:rtl;}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 2px var(--teal3);}
.full-w{grid-column:1/-1;}
.fee-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px;padding:10px;background:var(--bg3);border-radius:8px;}
.fee-label{font-size:10px;color:var(--text3);font-weight:700;}
.fee-inp{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-family:'Cairo',sans-serif;font-size:12px;color:var(--text);width:70px;text-align:center;direction:rtl;}
.fee-inp:focus{outline:none;border-color:var(--teal);}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:12px;}
.result-item{background:var(--bg3);border-radius:9px;padding:10px;display:flex;flex-direction:column;gap:3px;}
.result-label{font-size:9px;color:var(--text3);font-weight:600;}
.result-value{font-size:16px;font-weight:800;color:var(--text);}
.result-value.green{color:var(--green);}
.result-value.red{color:var(--red);}
.result-value.teal{color:var(--teal);}
.result-value.yellow{color:var(--yellow);}
.alert-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:10px;padding:12px 14px;font-size:11px;color:#fca5a5;margin-bottom:10px;display:none;line-height:1.8;}
.alert-box.show{display:block;}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;transition:all 0.2s;display:inline-flex;align-items:center;gap:5px;}
.btn-primary{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#000;box-shadow:0 4px 12px rgba(0,212,170,0.25);}
.btn-primary:hover{opacity:0.9;transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,212,170,0.35);}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--teal);color:var(--teal);}
.btn-danger{background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.25);}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px;}
.table-wrap{overflow-x:auto;border-radius:9px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{background:var(--bg3);padding:9px 10px;text-align:right;font-weight:700;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:9px 10px;border-bottom:1px solid rgba(31,45,69,0.4);color:var(--text);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.015);}
.td-input{background:transparent;border:1px solid transparent;border-radius:6px;padding:4px 6px;font-family:'Cairo',sans-serif;font-size:11px;color:var(--text);width:72px;text-align:center;}
.td-input:focus{outline:none;border-color:var(--teal);background:var(--bg3);}
.totals-row td{background:var(--bg3);font-weight:800;color:var(--teal);}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:700;}
.badge-green{background:rgba(16,185,129,0.15);color:var(--green);}
.badge-red{background:rgba(239,68,68,0.15);color:var(--red);}
.badge-yellow{background:rgba(245,158,11,0.15);color:var(--yellow);}
.badge-teal{background:var(--teal3);color:var(--teal);}
.compare-grid{display:grid;grid-template-columns:1fr;gap:9px;}
@media(min-width:480px){.compare-grid{grid-template-columns:1fr 1fr 1fr;}}
.compare-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:13px;}
.compare-card.winner{border-color:var(--teal);background:rgba(0,212,170,0.04);}
.ai-msgs{background:var(--bg3);border-radius:9px;padding:10px;height:260px;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:8px;}
.msg{padding:9px 12px;border-radius:9px;font-size:12px;line-height:1.6;max-width:88%;}
.msg-user{background:var(--teal3);border:1px solid rgba(0,212,170,0.15);align-self:flex-start;}
.msg-ai{background:var(--card2);border:1px solid var(--border);align-self:flex-end;}
.msg-label{font-size:9px;color:var(--text3);margin-bottom:3px;font-weight:700;}
.ai-row{display:flex;gap:7px;}
.ai-inp{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:'Cairo',sans-serif;font-size:12px;color:var(--text);direction:rtl;}
.ai-inp:focus{outline:none;border-color:var(--teal);}
.pricing-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:7px;}
.pricing-row:hover{background:var(--bg3);}
.divider{height:1px;background:var(--border);margin:2px 0;}
.tips-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.tip{background:var(--bg3);border-radius:7px;padding:9px 11px;font-size:10px;color:var(--text2);}
.tip strong{color:var(--teal);display:block;margin-bottom:2px;font-size:11px;}
.chart-wrap{position:relative;height:190px;margin-top:10px;}
@media(min-width:500px){.chart-wrap{height:230px;}}

body.light .form-input,
body.light .form-select,
body.light .fee-inp,
body.light .td-input,
body.light .ai-inp,
body.light .feedback-form input,
body.light .feedback-form textarea,
body.light .feedback-form select,
body.light .cur-sel{color:#1e293b!important;background:#e8edf5!important;}
body.light .form-input::placeholder,
body.light .ai-inp::placeholder,
body.light .feedback-form input::placeholder,
body.light .feedback-form textarea::placeholder{color:#94a3b8!important;}
@media print{.header,.cur-bar,.nav-tabs,.btn,.btn-row{display:none!important;}.section{display:block!important;}body{background:#fff;color:#000;}.card{border:1px solid #ddd;}}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e2a40;border:1px solid var(--teal);border-radius:10px;padding:10px 20px;font-family:'Cairo',sans-serif;font-size:11px;color:var(--teal);opacity:0;transition:all 0.3s;z-index:9998;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.user-info{display:flex;align-items:center;gap:8px;}
.user-name{font-size:10px;color:var(--teal);font-weight:700;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.logout-btn{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);border-radius:7px;padding:5px 9px;cursor:pointer;font-size:10px;font-weight:700;color:var(--red);font-family:'Cairo',sans-serif;}
.logout-btn:hover{background:rgba(239,68,68,0.2);}
.plan-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:9px;font-weight:800;}
.plan-free{background:rgba(100,116,139,0.2);color:#94a3b8;border:1px solid rgba(100,116,139,0.3);}
.plan-pro{background:rgba(0,212,170,0.15);color:var(--teal);border:1px solid rgba(0,212,170,0.3);}
.upgrade-banner{background:linear-gradient(135deg,rgba(0,212,170,0.08),rgba(59,130,246,0.08));border:1px solid rgba(0,212,170,0.2);border-radius:12px;padding:16px;text-align:center;margin-bottom:12px;}
.upgrade-banner h3{font-size:14px;font-weight:800;color:var(--teal);margin-bottom:6px;}
.upgrade-banner p{font-size:11px;color:var(--text2);margin-bottom:12px;line-height:1.6;}
.btn-upgrade{background:linear-gradient(135deg,var(--teal),var(--blue));color:#000;padding:10px 24px;border-radius:10px;border:none;font-family:'Cairo',sans-serif;font-size:13px;font-weight:800;cursor:pointer;}
.btn-upgrade:hover{opacity:0.9;transform:translateY(-1px);}
.lock-overlay{position:relative;}
.lock-overlay::after{content:'✓ ';position:absolute;inset:0;background:rgba(10,15,30,0.85);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--teal);}
.pricing-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0;}
@media(max-width:400px){.pricing-cards{grid-template-columns:1fr;}}
.pricing-card{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;}
.pricing-card.featured{border-color:var(--teal);background:rgba(0,212,170,0.04);position:relative;}
.pricing-card.featured::before{content:'الأشهر';position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--teal);color:#000;font-size:9px;font-weight:800;padding:2px 10px;border-radius:4px;}
.price-amount{font-size:28px;font-weight:900;color:var(--teal);margin:8px 0;}
.price-period{font-size:10px;color:var(--text3);}
.price-name{font-size:13px;font-weight:800;color:var(--text);margin-bottom:4px;}
.price-features{list-style:none;text-align:right;margin:10px 0;font-size:10px;color:var(--text2);line-height:2;}
.price-features li::before{content:'✓ ';color:var(--teal);font-weight:800;}
.price-features li.no::before{content:'× ';color:var(--text3);}
.price-features li.no{color:var(--text3);}

.trial-bar{display:none;}
.trial-bar.show{display:flex!important;}
.save-indicator{font-size:9px;color:var(--text3);margin-right:4px;transition:all 0.3s;}
.trial-banner{background:linear-gradient(135deg,rgba(245,158,11,0.12),rgba(239,68,68,0.08));border:1px solid rgba(245,158,11,0.3);border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.trial-banner-text{font-size:11px;color:var(--yellow);font-weight:700;}
.trial-banner-sub{font-size:10px;color:var(--text3);margin-top:2px;}
.trial-days{font-size:22px;font-weight:900;color:var(--yellow);line-height:1;}
.feedback-form input,.feedback-form textarea,.feedback-form select{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'Cairo',sans-serif;font-size:12px;color:var(--text);margin-bottom:8px;direction:rtl;}
.feedback-form input:focus,.feedback-form textarea:focus,.feedback-form select:focus{border-color:var(--teal);}
.feedback-form textarea{min-height:90px;}
.vote-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg3);border-radius:9px;margin-bottom:7px;}
.vote-item-text{font-size:12px;color:var(--text2);}
.vote-btn{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:4px 12px;font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;transition:all 0.2s;}
.vote-btn.voted{background:var(--teal3);border-color:var(--teal);color:var(--teal);}
.vote-btn:hover{border-color:var(--teal);color:var(--teal);}
.vote-count{font-size:10px;color:var(--text3);margin-right:6px;}

.save-indicator.saving{color:var(--yellow);}
.save-indicator.saved{color:var(--green);}
</style>
